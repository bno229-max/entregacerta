<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certify Delivery</title>
<meta name="theme-color" content="#2563EB">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;
    font-family:'Inter',sans-serif; background:
      radial-gradient(circle at 10% 0%, #DCE8FF 0%, transparent 40%),
      radial-gradient(circle at 100% 100%, #E9F9EE 0%, transparent 40%), #F5F6F8;
    color:#0F172A;
  }
  .card{width:100%; max-width:420px; background:#fff; border:1px solid #E4E7EC; border-radius:20px; padding:36px 30px; box-shadow:0 1px 2px rgba(16,24,40,.04), 0 4px 14px rgba(16,24,40,.05); text-align:center;}
  .logo{display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:24px;}
  .logo .mark{width:40px; height:40px; border-radius:11px; background:#2563EB; display:flex; align-items:center; justify-content:center; font-weight:800; color:#fff; font-size:17px;}
  .logo .name{font-weight:800; font-size:19px;}
  .logo .name span{color:#2563EB;}
  h1{font-size:19px; font-weight:700; margin-bottom:6px;}
  p{font-size:13.5px; color:#64748B; margin-bottom:26px; line-height:1.5;}
  a.btn{display:flex; align-items:center; justify-content:center; gap:10px; text-decoration:none; padding:14px 18px; border-radius:10px; font-weight:600; font-size:14.5px; margin-bottom:12px; transition:all .15s;}
  a.btn-primary{background:#2563EB; color:#fff;}
  a.btn-primary:hover{background:#1D4ED8;}
  a.btn-ghost{background:#fff; color:#334155; border:1px solid #E4E7EC;}
  a.btn-ghost:hover{border-color:#94A3B8;}
</style>
</head>
<body>
  <div class="card">
    <div class="logo"><div class="mark"><i class="fa-solid fa-truck-fast"></i></div><div class="name">Certify<span>Delivery</span></div></div>
    <h1>Escolha seu acesso</h1>
    <p>Confirmação digital de entrega (POD). Selecione abaixo qual painel deseja abrir.</p>
    <a class="btn btn-primary" href="./admin/"><i class="fa-solid fa-user-tie"></i> Acesso Administrativo</a>
    <a class="btn btn-ghost" href="./motorista/"><i class="fa-solid fa-truck"></i> Acesso do Motorista</a>
  </div>
</body>
</html>
